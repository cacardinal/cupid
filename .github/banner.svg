<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cupid — the matchmaker in your texts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0d12"/>
      <stop offset="0.55" stop-color="#12121c"/>
      <stop offset="1" stop-color="#1a0f1f"/>
    </linearGradient>
    <linearGradient id="brand" x1="120" y1="120" x2="640" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#b03cff"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#b03cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff4d6d" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ff4d6d" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="none" stroke="#262838" stroke-width="1.5"/>
  <circle cx="1000" cy="150" r="320" fill="url(#glow)"/>

  <!-- heart mark -->
  <g transform="translate(96,108)">
    <path d="M62 112 C 18 78, 0 50, 0 26 C 0 8, 14 -4, 31 -4 C 44 -4, 55 4, 62 16 C 69 4, 80 -4, 93 -4 C 110 -4, 124 8, 124 26 C 124 50, 106 78, 62 112 Z"
          fill="url(#brand)" filter="url(#soft)"/>
    <!-- chat tail, hinting SMS -->
    <circle cx="40" cy="44" r="6" fill="#ffffff" opacity="0.9"/>
    <circle cx="62" cy="44" r="6" fill="#ffffff" opacity="0.9"/>
    <circle cx="84" cy="44" r="6" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <text x="260" y="170" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#brand)" letter-spacing="-2">Cupid</text>
  <text x="262" y="214" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="27" font-weight="600" fill="#eef0f6">No swiping. No profiles. Just a conversation.</text>
  <text x="262" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#969cb0">An AI-first matchmaker that lives in your text messages.</text>

  <!-- SMS bubbles -->
  <g transform="translate(900,70)">
    <rect x="0" y="0" width="300" height="52" rx="26" fill="#15161e" stroke="#262838"/>
    <text x="26" y="33" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#eef0f6">hey, who am i looking for? 👀</text>
  </g>
  <g transform="translate(960,140)">
    <rect x="0" y="0" width="240" height="52" rx="26" fill="url(#bubbleA)"/>
    <text x="26" y="33" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff">someone who gets me.</text>
  </g>
  <g transform="translate(884,210)">
    <rect x="0" y="0" width="316" height="52" rx="26" fill="#15161e" stroke="#262838"/>
    <text x="26" y="33" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#eef0f6">on it. i know just the person 💘</text>
  </g>
</svg>
